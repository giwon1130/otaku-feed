name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Type check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'    # node:test + --experimental-strip-types 필요
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test
